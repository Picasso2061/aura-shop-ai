services:
  - type: web
    name: aura-shop-ai
    env: python
    buildCommand: npm run build --prefix frontend && pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: GEMINI_API_KEY
        sync: false # Set this in the Render Dashboard
